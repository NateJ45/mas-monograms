name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: browser-actions/setup-chrome@v1
      - run: npm ci
      - run: npm run build
      # Uploads reports to Google's temporary public LHCI storage (24h retention,
      # shareable URL in the Action logs) — acceptable for this project's content,
      # which is public marketing material, not sensitive data.
      - run: npx lhci autorun
